<style>
:root{
  --bg:#EEF4FB; --bg2:#E5EEF8;
  --surface:#FFFFFF; --surface2:#F5F8FD;
  --ink:#1F2A3D; --muted:#7A8699; --faint:#A9B3C2; --line:#E2E8F1;
  --green:#2E6FD6; --green-d:#1E54B0; --green-soft:#DCE8FA;
  --sage:#5B97E6;
  --sky:#3FA9E0; --sky-soft:#DAEEF9;
  --beige:#E9DEC8; --sand:#F3EBD9;
  --gold:#F2A93B; --gold-soft:#FCEBCF;
  --rose:#E06A4F; --rose-soft:#FBE3DC;
  --lilac:#A99BD4;
  --shadow:0 1px 2px rgba(39,50,43,.04),0 10px 30px rgba(39,50,43,.06);
  --shadow-lg:0 14px 50px rgba(39,50,43,.13);
  --r:22px; --r-sm:15px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',system-ui,sans-serif;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
  background:var(--bg);
  background-image:radial-gradient(110% 70% at 100% 0%,#EAF6F0 0%,rgba(234,246,240,0) 55%),radial-gradient(120% 80% at 0% 100%,#F2ECDC 0%,rgba(242,236,220,0) 50%);
  background-attachment:fixed;padding-bottom:46px;
}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
h1,h2,h3{font-family:'Reem Kufi',serif;font-weight:600;margin:0}

/* ===== Top ===== */
.topbar{position:sticky;top:0;z-index:30;background:rgba(236,244,238,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .wordmark{height:34px;width:auto;display:block}
.brand .greet-wrap{display:flex;align-items:center}
.brand .mark{width:42px;height:42px;border-radius:14px;overflow:hidden;flex:none;box-shadow:0 6px 16px rgba(76,165,133,.3)}
.brand .mark img{width:100%;height:100%;display:block}
.brand .t1{font-family:'Reem Kufi';font-size:18px;line-height:1}
.brand .t2{font-size:11.5px;color:var(--muted);margin-top:3px}
.topstats{display:flex;align-items:center;gap:9px}
.streak{display:flex;align-items:center;gap:5px;background:var(--gold-soft);border:1px solid #EAD9AC;color:#8A6D1E;padding:7px 11px;border-radius:14px;font-weight:800;font-size:14px}
.bell{background:var(--surface);border:1px solid var(--line);width:38px;height:38px;border-radius:13px;font-size:17px;cursor:pointer;box-shadow:var(--shadow);flex:none;transition:.15s;opacity:.55}
.bell:active{transform:scale(.92)}
.bell.on{opacity:1;background:var(--green-soft);border-color:var(--sage)}
.coin{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--green-d);padding:7px 12px;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--shadow)}
.coin:active{transform:scale(.95)}
.coin .lbl{font-size:9.5px;color:var(--muted);font-weight:700}
.ring{position:relative;width:48px;height:48px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:12.5px;color:var(--green-d)}

/* ===== Hero (greeting + motivation) ===== */
.hero{margin:18px 0 6px;text-align:center}
.hero .hi{font-family:'Reem Kufi';font-size:23px}
.hero .motiv{font-size:14px;color:var(--green-d);font-weight:700;margin-top:4px;min-height:21px}

/* ===== Date ===== */
.datebar{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 4px}
.datebar button{background:var(--surface);border:1px solid var(--line);width:34px;height:34px;border-radius:11px;font-size:16px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow)}
.datebar button:active{transform:scale(.93)}
.datebar .dlabel{text-align:center;min-width:155px}
.datebar .dlabel .d1{font-family:'Reem Kufi';font-size:15px}
.datebar .dlabel .d2{font-size:12px;color:var(--muted)}
.today-pill{font-size:10.5px;color:#fff;background:var(--green);padding:1px 9px;border-radius:20px;font-weight:800;display:inline-block;margin-top:2px}

/* ===== Inspiration ===== */
.inspo{position:relative;overflow:hidden;border-radius:var(--r);padding:24px 22px;margin:14px 0 22px;background:linear-gradient(140deg,var(--green-d),var(--sage));color:#fff;box-shadow:var(--shadow-lg)}
.inspo::before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);top:-100px;left:-40px}
.inspo .kind{position:relative;font-size:11.5px;font-weight:800;margin-bottom:10px;display:inline-block;background:rgba(255,255,255,.18);padding:4px 13px;border-radius:20px}
.inspo .txt{position:relative;font-family:'Reem Kufi';font-size:20px;line-height:1.9;font-weight:500}
.inspo .src{position:relative;font-size:12px;opacity:.82;margin-top:11px}
.inspo .deco{position:absolute;bottom:-26px;left:-4px;font-size:100px;opacity:.1;font-family:'Reem Kufi';line-height:1}

/* ===== Sections ===== */
.section{margin-bottom:24px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}
.section-head h2{font-size:17px;display:flex;align-items:center;gap:10px}
.section-head .ico{width:31px;height:31px;border-radius:10px;display:grid;place-items:center;font-size:15px;background:var(--green-soft)}
.section-head .meta{font-size:12.5px;color:var(--muted);font-weight:800;background:var(--surface);padding:3px 11px;border-radius:20px;border:1px solid var(--line)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}

/* ===== Progress card (chart + stats) ===== */
.prog-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 18px 14px;margin-bottom:22px}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.prog-top .big{font-family:'Reem Kufi';font-size:15px}
.bigring{position:relative;width:96px;height:96px;margin:0 auto 6px}
.bigring svg{transform:rotate(-90deg)}
.bigring .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.bigring .c .n{font-family:'Reem Kufi';font-size:28px;line-height:1;color:var(--green-d)}
.bigring .c .l{font-size:11px;color:var(--muted)}
.week{display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:84px;margin-top:8px;padding-top:6px}
.wbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.wbar .bar{width:100%;max-width:26px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--green),var(--sage));min-height:5px;transition:height .5s ease;position:relative}
.wbar.today .bar{background:linear-gradient(180deg,var(--gold),#E0C16B);box-shadow:0 0 0 2px var(--gold-soft)}
.wbar .dl{font-size:10.5px;color:var(--muted);font-weight:700}
.wbar .vv{font-size:9.5px;color:var(--faint)}
.stats3{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:11px 6px}
.stat .sv{font-family:'Reem Kufi';font-size:18px;color:var(--green-d)}
.stat .sl{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:1px}

/* ===== Prayers ===== */
.pray{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;transition:.2s}
.pray+.pray{border-top:1px solid var(--line)}
.pray.done{background:linear-gradient(90deg,var(--green-soft),transparent)}
.pray .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px}
.pray .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:.2s}
.pray.done .dot{background:var(--green)}
.pray .opts{display:flex;gap:6px}
.popt{border:1.5px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:11px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.14s}
.popt:active{transform:scale(.94)}
.popt.on{border-color:transparent;background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(76,165,133,.3)}
.popt.on.home{background:var(--sky);box-shadow:0 4px 12px rgba(111,179,214,.3)}

/* ===== Habits ===== */
.habits{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.habit{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:15px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:8px;min-height:94px;user-select:none;overflow:hidden}
.habit:active{transform:scale(.96)}
.habit .hico{font-size:23px;line-height:1;transition:.25s}
.habit .hname{font-size:13.5px;font-weight:700}
.habit .hsub{font-size:11px;color:var(--faint)}
.habit.done{background:linear-gradient(150deg,var(--green-soft),#EAF6EF);border-color:var(--sage)}
.habit.done .hico{transform:scale(1.12)}
.habit .check{position:absolute;top:12px;left:12px;width:21px;height:21px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;color:transparent;transition:.2s}
.habit.done .check{background:var(--green);border-color:var(--green);color:#fff}
.water{grid-column:1/-1;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:15px 16px}
.water .wtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.water .wname{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.water .wcount{font-weight:800;color:var(--sky);font-family:'Reem Kufi'}
.cups{display:flex;gap:7px}
.cup{flex:1;min-width:0;height:36px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface2);cursor:pointer;display:grid;place-items:center;font-size:15px;transition:.15s;color:var(--faint)}
.cup:active{transform:scale(.88)}
.cup.full{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}

/* ===== Tasks ===== */
.task-add{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--line)}
.task-add input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:14px;background:var(--surface2);color:var(--ink);outline:none}
.task-add input:focus{border-color:var(--green)}
.task-add button{flex:none;width:46px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 12px rgba(76,165,133,.3)}
.task-add button:active{transform:scale(.93)}
.task{display:flex;align-items:center;gap:12px;padding:13px 15px}
.task+.task{border-top:1px solid var(--line)}
.task .tcheck{width:23px;height:23px;border-radius:8px;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px;color:transparent;cursor:pointer;transition:.2s}
.task.done .tcheck{background:var(--green);border-color:var(--green);color:#fff}
.task .ttext{flex:1;font-size:14.5px;font-weight:500}
.task.done .ttext{text-decoration:line-through;color:var(--faint)}
.task .tdel{border:none;background:none;color:var(--faint);font-size:17px;cursor:pointer;padding:4px}
.task .tdel:active{color:var(--rose)}
.empty{text-align:center;color:var(--faint);font-size:13.5px;padding:24px 14px}

/* ===== Money ===== */
.accounts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.acc{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:.15s;overflow:hidden}
.acc:active{transform:scale(.97)}
.acc .an{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px}
.acc .ab{font-size:20px;font-weight:800;margin-top:6px;font-family:'Reem Kufi'}
.acc .ab .cur{font-size:12px;color:var(--faint);font-weight:500;font-family:'Tajawal'}
.money-actions{display:flex;gap:11px;margin-bottom:15px}
.money-actions button{flex:1;border:none;border-radius:14px;padding:14px;font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;transition:.14s;color:#fff}
.money-actions button:active{transform:scale(.96)}
.btn-out{background:var(--rose);box-shadow:0 6px 16px rgba(217,135,115,.3)}
.btn-in{background:var(--green);box-shadow:0 6px 16px rgba(76,165,133,.3)}
.btn-charity{background:linear-gradient(145deg,var(--gold),#B5923F);box-shadow:0 6px 16px rgba(201,162,75,.3)}
.tx{display:flex;align-items:center;gap:12px;padding:13px 15px}
.tx+.tx{border-top:1px solid var(--line)}
.tx .txico{width:38px;height:38px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:17px}
.tx.out .txico{background:var(--rose-soft)}
.tx.in .txico{background:var(--green-soft)}
.tx .txmain{flex:1;min-width:0}
.tx .txcat{font-size:14px;font-weight:700}
.tx .txsub{font-size:11px;color:var(--muted)}
.tx .txamt{font-weight:800;font-size:15px;font-family:'Reem Kufi'}
.tx.out .txamt{color:var(--rose)}
.tx.in .txamt{color:var(--green-d)}
.tx .txdel{border:none;background:none;color:var(--faint);font-size:15px;cursor:pointer;padding:2px 4px}
.spend-bar{display:flex;gap:7px;margin:2px 4px 16px;flex-wrap:wrap}
.spend-chip{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow)}
.spend-chip b{color:var(--rose)}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(39,50,43,.4);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay.show{display:flex}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:26px 26px 0 0;padding:8px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -12px 50px rgba(0,0,0,.18);animation:up .26s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(50px);opacity:.5}to{transform:translateY(0);opacity:1}}
.grab{width:42px;height:4px;border-radius:4px;background:var(--line);margin:8px auto 16px}
.sheet h3{font-size:18px;margin-bottom:18px;text-align:center}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.field input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;font-size:15px;background:var(--surface2);color:var(--ink);outline:none}
.field input:focus{border-color:var(--green)}
.field input.big{font-size:28px;font-weight:800;font-family:'Reem Kufi';text-align:center;color:var(--green-d)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip-opt{border:1.5px solid var(--line);background:var(--surface2);border-radius:13px;padding:10px 15px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:.14s}
.chip-opt.on{border-color:transparent;background:var(--green);color:#fff}
.sheet .save{width:100%;border:none;border-radius:15px;padding:16px;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 6px 16px rgba(76,165,133,.3)}
.sheet .save:active{transform:scale(.98)}
.sheet .save.out{background:var(--rose)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;opacity:0;transition:.3s;z-index:100;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* budget + savings */
.budget-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.bsplit{display:flex;gap:12px;margin-bottom:14px}
.bbox{flex:1;text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:12px 8px;cursor:pointer}
.bbox .bl{font-size:11px;color:var(--muted);font-weight:700}
.bbox .bv{font-family:'Reem Kufi';font-size:19px;margin-top:3px}
.bbox.save .bv{color:var(--green-d)}
.bbar-wrap{margin-top:4px}
.bbar-lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px}
.bbar-lbl .r{color:var(--muted)}
.bbar{height:10px;border-radius:6px;background:var(--surface2);border:1px solid var(--line);overflow:hidden}
.bbar .fill{height:100%;border-radius:6px;transition:width .5s}
.bsub{font-size:11.5px;color:var(--muted);margin-top:7px;text-align:center}

.foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:30px}

/* reminder banner */
.remind{background:var(--gold-soft);border:1px solid #EAD9AC;border-radius:var(--r-sm);padding:13px 16px;margin:0 0 16px;display:flex;align-items:center;gap:11px;font-size:13.5px;font-weight:700;color:#8A6D1E}
.remind .rico{font-size:20px}
.remind.challenge{background:var(--sky-soft);border-color:#BBDDEC;color:#2A6585}
/* Now card + prayer times */
.now-card{background:linear-gradient(135deg,var(--green-d),var(--sage));color:#fff;border-radius:var(--r);padding:18px 19px;margin:14px 0 12px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.now-card::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%);top:-80px;left:-30px}
.now-card .nc-label{position:relative;font-size:11.5px;font-weight:800;opacity:.85;letter-spacing:.5px}
.now-card .nc-main{position:relative;font-family:'Reem Kufi';font-size:20px;margin-top:5px;display:flex;align-items:center;gap:9px}
.now-card .nc-sub{position:relative;font-size:12.5px;opacity:.85;margin-top:5px}
.now-card .nc-btn{position:relative;margin-top:13px;display:inline-flex;gap:7px;align-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:12px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.now-card .nc-btn:active{transform:scale(.97)}
.now-card .nc-next{position:relative;margin-top:11px;background:rgba(255,255,255,.12);border-radius:12px;padding:9px 13px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.now-card .nc-next b{font-family:'Reem Kufi';font-weight:600}

.praytimes{display:flex;gap:6px;margin:0 0 14px;overflow-x:auto;padding:2px}
.pt{flex:1;min-width:56px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:9px 4px;text-align:center;box-shadow:var(--shadow)}
.pt.next{border-color:var(--green);background:var(--green-soft)}
.pt.passed{opacity:.5}
.pt .pn{font-size:11.5px;font-weight:700;color:var(--muted)}
.pt.next .pn{color:var(--green-d)}
.pt .pv{font-family:'Reem Kufi';font-size:13.5px;margin-top:2px}
.pt .pic{font-size:13px}
.loc-ask{background:var(--surface);border:1px dashed var(--sage);border-radius:var(--r-sm);padding:13px 15px;margin:6px 0 14px;font-size:13px;display:flex;align-items:center;gap:10px}
.loc-ask button{margin-right:auto;border:none;background:var(--green);color:#fff;border-radius:10px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;flex:none}

.remind.charity-rem{background:var(--gold-soft);border-color:#EAD9AC;color:#8A6D1E}
.remind+.remind{margin-top:-8px}

/* challenge + breakfast mini cards */
.duo{margin:0 0 22px}
.mini-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 17px;margin-bottom:12px;position:relative;overflow:hidden}
.mini-card .mc-head{display:flex;align-items:center;gap:8px;font-family:'Reem Kufi';font-size:14px;margin-bottom:9px}
.mini-card .mc-head .tag{margin-right:auto;font-family:'Tajawal';font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:20px;background:var(--green-soft);color:var(--green-d)}
.challenge-card .mc-body{font-size:15.5px;font-weight:700;line-height:1.7}
.challenge-card .mc-why{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.7}
.challenge-card .mc-why b{color:var(--green-d);font-weight:700}
.mc-btn{margin-top:13px;width:100%;border:none;border-radius:13px;padding:12px;font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(46,111,214,.25);transition:.14s}
.mc-btn:active{transform:scale(.98)}
.mc-btn.done{background:var(--green-soft);color:var(--green-d);box-shadow:none}
.breakfast-card .mc-body{font-size:15px;font-weight:700;line-height:1.7}
.breakfast-card .mc-sub{font-size:12px;color:var(--muted);margin-top:5px}
.mc-refresh{position:absolute;top:13px;left:14px;background:var(--surface2);border:1px solid var(--line);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--muted)}
.mc-refresh:active{transform:scale(.9) rotate(-30deg)}

/* weekly stats */
.wkstats{display:flex;flex-direction:column}
.wkrow{display:flex;align-items:center;gap:12px;padding:12px 14px}
.wkrow+.wkrow{border-top:1px solid var(--line)}
.wkrow .wkico{width:36px;height:36px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:17px;background:var(--green-soft)}
.wkrow .wkmain{flex:1;min-width:0}
.wkrow .wkname{font-size:13.5px;font-weight:700}
.wkrow .wktrack{height:7px;border-radius:5px;background:var(--surface2);margin-top:6px;overflow:hidden;border:1px solid var(--line)}
.wkrow .wkfill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--sage));transition:width .5s}
.wkrow .wkval{font-family:'Reem Kufi';font-size:15px;color:var(--green-d);flex:none;min-width:54px;text-align:left}

/* ===== Celebration ===== */
.celebrate{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;pointer-events:none}
.celebrate.show{display:flex}
.celebrate .msg{background:#fff;border-radius:24px;padding:26px 30px;text-align:center;box-shadow:var(--shadow-lg);animation:pop .4s cubic-bezier(.2,.9,.3,1.3);pointer-events:auto}
.celebrate .msg .em{font-size:54px;line-height:1}
.celebrate .msg .t{font-family:'Reem Kufi';font-size:21px;margin-top:8px;color:var(--green-d)}
.celebrate .msg .s{font-size:14px;color:var(--muted);margin-top:4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:95;border-radius:2px;pointer-events:none}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
@keyframes fall{to{transform:translateY(105vh) rotate(620deg);opacity:.9}}
@keyframes popdone{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
.popnow{animation:popdone .4s ease}

/* boot loader + lock */
.bootload{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.bootload .spin{width:42px;height:42px;border-radius:50%;border:4px solid var(--green-soft);border-top-color:var(--green);animation:spin 1s linear infinite}
.bootload .bl-t{color:var(--muted);font-weight:700;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lock{position:fixed;inset:0;z-index:210;background:linear-gradient(160deg,var(--green-d),var(--sage));display:none;align-items:center;justify-content:center;padding:24px}
.lock.show{display:flex}
.lock-box{background:#fff;border-radius:24px;padding:30px 26px;width:100%;max-width:340px;text-align:center;box-shadow:var(--shadow-lg)}
.lock-mark{width:56px;height:56px;border-radius:18px;background:linear-gradient(145deg,var(--green),var(--sage));display:grid;place-items:center;color:#fff;font-family:'Reem Kufi';font-size:28px;margin:0 auto 14px}
.lock-box h3{font-size:20px}
.lock-sub{font-size:13px;color:var(--muted);margin:8px 0 18px;line-height:1.7}
.lock-box input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:14px;font-family:inherit;font-size:22px;text-align:center;letter-spacing:6px;background:var(--surface2);color:var(--ink);outline:none}
.lock-box input:focus{border-color:var(--green)}
.lock-err{color:var(--rose);font-size:12.5px;font-weight:700;min-height:18px;margin:8px 0}
.lock-box button{width:100%;border:none;border-radius:14px;padding:15px;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(76,165,133,.3)}
.lock-box button:active{transform:scale(.98)}
</style>
</head>

const PRAY_MOSQUE=1, PRAY_HOME=0.6;
function prayValue(p){return p==='mosque'?PRAY_MOSQUE:p==='home'?PRAY_HOME:0;}
// نسبة إنجاز يوم معيّن
function dayPct(d){
  const day=getDayD(d);
  const pray=PRAYERS.reduce((s,[k])=>s+prayValue(day.prayers[k]),0); // 0..5
  const hab=HABITS.filter(h=>day.habits[h.k]).length+((day.water||0)>=WATER_GOAL?1:0);
  const tT=(day.tasks||[]).length,tD=(day.tasks||[]).filter(t=>t.done).length;
  const total=5+HABITS.length+1+tT, done=pray+hab+tD;
  return total?Math.round(done/total*100):0;
}
// يوم "ناجح" لو ≥60%
function daySuccess(d){return dayPct(d)>=60;}
function calcStreak(){
  let s=0; let d=new Date(); d.setHours(0,0,0,0);
  // لو النهاردة لسه مكملش، نبدأ من امبارح
  if(!daySuccess(d)) d.setDate(d.getDate()-1);
  for(let i=0;i<400;i++){ if(daySuccess(d)){s++; d.setDate(d.getDate()-1);} else break; }
  return s;
}
function bestStreak(){
  // أطول سلسلة في آخر 120 يوم
  let best=0,cur=0,d=new Date();d.setHours(0,0,0,0);
  for(let i=0;i<120;i++){const dd=new Date(d);dd.setDate(dd.getDate()-i);if(daySuccess(dd)){cur++;best=Math.max(best,cur);}else cur=0;}
  return best;
}
function monthAvg(){
  let sum=0,cnt=0,base=new Date(cursor);
  for(let i=0;i<base.getDate();i++){const dd=new Date(base.getFullYear(),base.getMonth(),i+1);if(dd>new Date())break;sum+=dayPct(dd);cnt++;}
  return cnt?Math.round(sum/cnt):0;
}

function renderReminder(){
  const box=$('reminder'); if(!isToday()){box.innerHTML='';return;}
  const d=getDay();
  const h=new Date().getHours();
  let msgs=[];
  // صلاة لسه ما اتسجّلتش — بمواعيد الصلاة الحقيقية (ما يطالبش بصلاة قبل أذانها)
  const nowMin=h*60+new Date().getMinutes();
  const prayDefs=[['fajr','الفجر','Fajr'],['dhuhr','الظهر','Dhuhr'],['asr','العصر','Asr'],['maghrib','المغرب','Maghrib'],['isha','العشاء','Isha']];
  const duePray=prayDefs.filter(([k,n,cap])=>{
    if(d.prayers[k])return false;
    if(TIMES && TIMES[cap]){ return nowMin>=toMin(TIMES[cap]); } // أذّنت فعلًا
    return false; // من غير مواعيد حقيقية، ما نطالبش بصلاة (الكارت بيكفّي)
  }).map(x=>x[1]);
  if(duePray.length) msgs.push({ico:'🕌',cls:'',t:`لسه ما سجّلتش: ${duePray.join('، ')}`});
  // المية: فكّر بس لو متأخّر عن المعدّل المتوقّع حسب الوقت (مش طول اليوم)
  if((d.water||0)<WATER_GOAL){
    const startH=8, endH=22; // يوم الشرب من 8ص لـ 10م
    if(h>=startH){
      const frac=Math.min(1,(h-startH)/(endH-startH));
      const expected=Math.ceil(frac*WATER_GOAL); // المفروض شربت كام لحد دلوقتي
      if((d.water||0) < expected){
        const left=WATER_GOAL-(d.water||0);
        msgs.push({ico:'💧',cls:'',t:`خد بريك واشرب كوباية مية 💧 (فاضلك ${left})`});
      }
    }
  }
  if(!d.habits.adhkarAM && h<12) msgs.push({ico:'🌅',cls:'',t:'متنساش أذكار الصباح'});
  if(!d.habits.adhkarPM && h>=17) msgs.push({ico:'🌙',cls:'',t:'متنساش أذكار المساء'});
  if(!d.habits.pill && h>=12) msgs.push({ico:'💊',cls:'',t:'أخدت الكولشيسين؟'});
  // تذكير الصدقة يوم الجمعة
  if(new Date().getDay()===5){
    const gaveToday=getTx().some(t=>t.type==='charity'&&t.date===ymd(new Date()));
    if(!gaveToday) msgs.push({ico:'🤲',cls:'charity-rem',t:'النهاردة جمعة — متنساش صدقتك 🤍'});
  }
  let html='';
  const charityMsg=msgs.find(m=>m.cls==='charity-rem');
  const otherMsgs=msgs.filter(m=>m.cls!=='charity-rem');
  if(otherMsgs.length){const m=otherMsgs[0];html+=`<div class="remind ${m.cls}"><span class="rico">${m.ico}</span><span>${m.t}</span></div>`;}
  if(charityMsg){html+=`<div class="remind charity-rem"><span class="rico">${charityMsg.ico}</span><span>${charityMsg.t}</span></div>`;}
  box.innerHTML=html;
}

function dayIndex(){return Math.floor(cursor.getTime()/864e5);}
function renderChallenge(){
  const idx=((dayIndex()%CHALLENGES.length)+CHALLENGES.length)%CHALLENGES.length;
  const c=CHALLENGES[idx]; const d=getDay(); const done=!!d.challengeDone;
  $('challengeCard').innerHTML=`
    <div class="mc-head">${c.ico} تحدّي النهاردة <span class="tag">${c.tag}</span></div>
    <div class="mc-body">${c.t}</div>
    <div class="mc-why"><b>ليه؟</b> ${c.why}</div>
    <button class="mc-btn ${done?'done':''}" onclick="toggleChallenge()">${done?'✓ عملته — تسلم 🤍':'تمّ ✓'}</button>`;
}
function toggleChallenge(){
  const d=getDay(); d.challengeDone=!d.challengeDone; if(!d.challengeDone)delete d.challengeDone; setDay(d);
  renderChallenge(); renderTop();
  if(d.challengeDone){ feedback('big'); toast('تحدّي النهاردة خلص 🎯'); }
}
function renderBreakfast(){
  const d=getDay();
  if(d.bfIdx===undefined) d.bfIdx=((dayIndex()%BREAKFASTS.length)+BREAKFASTS.length)%BREAKFASTS.length;
  const b=BREAKFASTS[d.bfIdx%BREAKFASTS.length];
  $('breakfastCard').innerHTML=`
    <button class="mc-refresh" onclick="shuffleBreakfast()" title="اقتراح تاني">🔄</button>
    <div class="mc-head">🍳 فطار النهاردة</div>
    <div class="mc-body">${b.t}</div>
    <div class="mc-sub">${b.sub}</div>`;
}
function shuffleBreakfast(){
  const d=getDay(); let n=Math.floor(Math.random()*BREAKFASTS.length);
  if(n===(d.bfIdx||0)) n=(n+1)%BREAKFASTS.length;
  d.bfIdx=n; setDay(d); renderBreakfast();
}

let TIMES=null; // {Fajr,Sunrise,Dhuhr,Asr,Maghrib,Isha} بصيغة HH:MM
const PT_SEQ=[['Fajr','الفجر','🌅'],['Sunrise','الشروق','☀️'],['Dhuhr','الظهر','🕌'],['Asr','العصر','🕌'],['Maghrib','المغرب','🌇'],['Isha','العشاء','🌙']];
const PT_TO_PRAYER={Fajr:'fajr',Dhuhr:'dhuhr',Asr:'asr',Maghrib:'maghrib',Isha:'isha'};
function getLoc(){return load('life:loc',null);}
function toMin(t){if(!t)return null;const [h,m]=t.split(':').map(Number);return h*60+m;}
function fmtDur(min){min=Math.max(0,Math.round(min));const h=Math.floor(min/60),m=min%60;return h?`${h} س ${m} د`:`${m} د`;}
function fmt12(t){if(!t)return'';let [h,m]=t.split(':').map(Number);const am=h<12;let hh=h%12;if(hh===0)hh=12;return `${hh}:${String(m).padStart(2,'0')} ${am?'ص':'م'}`;}
async function fetchTimes(){
  const loc=getLoc(); if(!loc)return null;
  const dd=new Date(); const ds=`${String(dd.getDate()).padStart(2,'0')}-${String(dd.getMonth()+1).padStart(2,'0')}-${dd.getFullYear()}`;
  const ckey='pt:'+ds+':'+loc.lat.toFixed(2)+','+loc.lng.toFixed(2);
  const cached=load(ckey,null); if(cached)return cached;
  try{
    const url=`https://api.aladhan.com/v1/timings/${ds}?latitude=${loc.lat}&longitude=${loc.lng}&method=5`;
    const r=await fetch(url); const j=await r.json();
    const t=j.data.timings;
    const out={Fajr:t.Fajr,Sunrise:t.Sunrise,Dhuhr:t.Dhuhr,Asr:t.Asr,Maghrib:t.Maghrib,Isha:t.Isha};
    save(ckey,out); return out;
  }catch(e){ console.warn('times',e); return null; }
}

function nextPrayer(){
  if(!TIMES)return null;
  const now=new Date().getHours()*60+new Date().getMinutes();
  for(const [k,n,ic] of PT_SEQ){ const tm=toMin(TIMES[k]); if(tm!==null && tm>now) return {key:k,name:n,ico:ic,min:tm,inMin:tm-now}; }
  return {key:'Fajr',name:'الفجر',ico:'🌅',min:toMin(TIMES.Fajr),inMin:(24*60-now)+toMin(TIMES.Fajr)}; // فجر بكرة
}
function renderPrayTimes(){
  const box=$('prayTimes'); if(!isToday()){box.style.display='none';return;}
  if(!TIMES){ box.style.display='none'; return; }
  box.style.display='flex';
  const now=new Date().getHours()*60+new Date().getMinutes();
  const np=nextPrayer();
  box.innerHTML=PT_SEQ.map(([k,n,ic])=>{
    const tm=toMin(TIMES[k]); const passed=tm<now; const isNext=np&&np.key===k&&isToday();
    return `<div class="pt ${isNext?'next':''} ${passed&&!isNext?'passed':''}"><div class="pic">${ic}</div><div class="pn">${n}</div><div class="pv">${fmt12(TIMES[k])}</div></div>`;
  }).join('');
}
function quickHabit(k){const d=getDay();d.habits[k]=true;setDay(d);render();}
function renderNow(){
  const card=$('nowCard'); 
  if(!isToday()){card.style.display='none';return;}
  // لو مفيش موقع: اعرض دعوة لتحديد الموقع داخل الكارت
  if(!getLoc()){
    card.style.display='block';
    card.innerHTML=`<div class="nc-label">📍 فعّل مواعيد الصلاة</div>
      <div class="nc-main">خلّي «يومي» يعرف مواعيد صلاتك</div>
      <div class="nc-sub">هنجيب مواعيد الصلاة والشروق بالظبط لمكانك</div>
      <button class="nc-btn" onclick="askLocation()">📍 حدّد موقعي</button>`;
    return;
  }
  card.style.display='block';
  const d=getDay(); const now=new Date().getHours()*60+new Date().getMinutes();
  const np=nextPrayer();
  // حدّد الخطوة الحالية
  let step=null;
  if(TIMES){
    // هل احنا في وقت صلاة لسه ما اتسجّلتش؟ (بين الأذان والصلاة اللي بعدها)
    for(let i=0;i<PT_SEQ.length;i++){
      const [k,n,ic]=PT_SEQ[i]; if(k==='Sunrise')continue;
      const tm=toMin(TIMES[k]); const nextTm=i<PT_SEQ.length-1?toMin(TIMES[PT_SEQ[i+1][0]]):24*60;
      if(now>=tm && now<nextTm && !d.prayers[PT_TO_PRAYER[k]]){
        step={label:'وقت الصلاة',main:`${ic} صلاة ${n}`,sub:`بتخلص قبل ${PT_SEQ[i+1]?PT_SEQ[i+1][1]:'الفجر'} · فاضل ${fmtDur(nextTm-now)}`,btn:'سجّل صلاتك',act:`document.getElementById('prayers').scrollIntoView({behavior:'smooth'})`};
        break;
      }
    }
  }
  // لو مفيش صلاة مستحقة، رتّب باقي اليوم
  if(!step){
    const h=new Date().getHours();
    if(TIMES && now>=toMin(TIMES.Fajr) && now<toMin(TIMES.Dhuhr)){
      if(!d.habits.adhkarAM) step={label:'دلوقتي',main:'🌅 أذكار الصباح',sub:'ابدأ يومك بذكر الله',btn:'تمّ',act:`quickHabit('adhkarAM')`};
      else if(!d.habits.quran) step={label:'دلوقتي',main:'📖 وردك القرآني',sub:'ولو صفحة، المهم تداوم',btn:'تمّ',act:`quickHabit('quran')`};
      else step={label:'دلوقتي',main:'🍳 فطارك',sub:'شوف اقتراح النهاردة تحت',btn:'شوف الفطار',act:`document.getElementById('breakfastCard').scrollIntoView({behavior:'smooth'})`};
    } else if((d.water||0)<WATER_GOAL && h>=11 && h<18){
      step={label:'دلوقتي',main:'💧 اشرب مية',sub:`شربت ${d.water||0} من ٨ — كمّل`,btn:'كوباية +',act:`setWater((getDay().water||0)+1)`};
    } else if(TIMES && now>=toMin(TIMES.Maghrib)){
      if(!d.habits.adhkarPM) step={label:'دلوقتي',main:'🌙 أذكار المساء',sub:'اختم يومك بذكر الله',btn:'تمّ',act:`quickHabit('adhkarPM')`};
      else if(!d.habits.sleep && new Date().getHours()>=22) step={label:'قبل ما تنام',main:'😴 نوم بدري',sub:'جسمك يستاهل راحة',btn:'تمّ',act:`quickHabit('sleep')`};
    }
  }
  if(!step){ step={label:'دلوقتي',main:'🌿 يومك ماشي تمام',sub:'كمّل كده، ربنا معاك',btn:null,act:null}; }
  let nextLine='';
  if(np && isToday()) nextLine=`<div class="nc-next"><span>${np.ico} ${np.name} الجاية</span><b>بعد ${fmtDur(np.inMin)}</b></div>`;
  card.innerHTML=`<div class="nc-label">${step.label}</div>
    <div class="nc-main">${step.main}</div>
    <div class="nc-sub">${step.sub}</div>
    ${step.btn?`<button class="nc-btn" onclick="${step.act}">${step.btn}</button>`:''}
    ${nextLine}`;
}

let _ac=null;
function feedback(kind){
  try{ if(navigator.vibrate) navigator.vibrate(kind==='big'?[30,40,30]:25); }catch(e){}
  try{
    if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)();
    if(_ac.state==='suspended') _ac.resume();
    const o=_ac.createOscillator(), g=_ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type='sine';
    const t=_ac.currentTime;
    if(kind==='big'){ o.frequency.setValueAtTime(660,t); o.frequency.setValueAtTime(880,t+0.09); }
    else { o.frequency.setValueAtTime(760,t); }
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(kind==='big'?0.22:0.13));
    o.start(t); o.stop(t+(kind==='big'?0.24:0.15));
  }catch(e){}
}

    const devPin=localStorage.getItem('yomy:devpin');
    if(cloudPin && devPin===cloudPin){resolve();return;}
    const lock=$('lock'); lock.classList.add('show');
    const create=!cloudPin;
    $('lockTitle').textContent=create?'🔒 اعمل كلمة سر':'🔒 اكتب كلمة السر';
    $('lockSub').textContent=create?'عشان حد ما يفتحش بياناتك. هتكتبها مرة على كل جهاز.':'دخّل كلمة السر بتاعتك';
    $('lockInput').value=''; $('lockErr').textContent=''; setTimeout(()=>$('lockInput').focus(),200);
    function submit(){
      const v=$('lockInput').value.trim(); if(!v){$('lockErr').textContent='اكتب كلمة السر';return;}
      if(create){ save('auth:pin',v); localStorage.setItem('yomy:devpin',v); lock.classList.remove('show'); resolve(); }
      else { if(v===cloudPin){ localStorage.setItem('yomy:devpin',v); lock.classList.remove('show'); resolve(); } else { $('lockErr').textContent='كلمة السر غلط'; $('lockInput').value=''; } }
    }
    $('lockBtn').onclick=submit;
    $('lockInput').onkeydown=e=>{if(e.key==='Enter')submit();};
  });
}

    try{new Notification('يومي 🌿',{body:'الإشعارات اشتغلت! هفكّرك بصلواتك وعاداتك.'});}catch(e){}
    toast('الإشعارات اشتغلت ✓'); renderTop();
  } else { toast('لازم تسمح بالإشعارات من المتصفّح'); }
}
let _notifTimer=null;
function startNotifLoop(){
  if(_notifTimer) clearInterval(_notifTimer);
  checkNotifsNow();
  _notifTimer=setInterval(checkNotifsNow,60000); // كل دقيقة
}
function firedKey(k){return 'notif:fired:'+ymd(new Date())+':'+k;}
function checkNotifsNow(){
  if(!notifOn())return;
  const now=new Date(); const h=now.getHours(), m=now.getMinutes();
  const today=getDayD(new Date());
  NOTIF_TIMES.forEach(n=>{
    let nh=n.h, nm=n.m;
    // لو فيه مواعيد صلاة حقيقية، استخدمها
    if(n.prayer && TIMES){ const cap=n.prayer.charAt(0).toUpperCase()+n.prayer.slice(1); if(TIMES[cap]){ const [hh,mm]=TIMES[cap].split(':').map(Number); nh=hh; nm=mm; } }
    // الوقت وصل (في خلال 3 ساعات من الموعد) ولسه ما اتبعتش النهاردة
    const due = (h>nh || (h===nh && m>=nm)) && (h<nh+3);
    if(!due) return;
    if(load(firedKey(n.k),false)) return;
    // لو الحاجة اتعملت خلاص، ما تبعتش
    if(n.prayer && today.prayers[n.prayer]) return;
    if(n.habit && today.habits[n.habit]) return;
    if(n.check && !n.check(today)) return;
    fireNotif(n.msg);
    save(firedKey(n.k),true);
  });
}
function fireNotif(body){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>reg.showNotification('يومي 🌿',{body,icon:ICON_URI,badge:ICON_URI,tag:'yomy',dir:'rtl',lang:'ar'})).catch(()=>{
        new Notification('يومي 🌿',{body,icon:ICON_URI});
      });
    } else { new Notification('يومي 🌿',{body,icon:ICON_URI}); }
  }catch(e){ console.warn('notif',e); }
}
boot();
