<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#EAF3EC">
<title>يومي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@500;600;700&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#ECF4EE; --bg2:#E4EFE8;
  --surface:#FFFFFF; --surface2:#F6FAF6;
  --ink:#27322B; --muted:#7C8B81; --faint:#AEBAB1; --line:#E4EBE3;
  --green:#4CA585; --green-d:#37876B; --green-soft:#DBEFE5;
  --sage:#8FBFA8;
  --sky:#6FB3D6; --sky-soft:#DCEEF6;
  --beige:#E9DEC8; --sand:#F3EBD9;
  --gold:#C9A24B; --gold-soft:#F5ECD4;
  --rose:#D98873; --rose-soft:#F7E5DE;
  --lilac:#A99BD4;
  --shadow:0 1px 2px rgba(39,50,43,.04),0 10px 30px rgba(39,50,43,.06);
  --shadow-lg:0 14px 50px rgba(39,50,43,.13);
  --r:22px; --r-sm:15px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal',system-ui,sans-serif;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
  background:var(--bg);
  background-image:radial-gradient(110% 70% at 100% 0%,#EAF6F0 0%,rgba(234,246,240,0) 55%),radial-gradient(120% 80% at 0% 100%,#F2ECDC 0%,rgba(242,236,220,0) 50%);
  background-attachment:fixed;padding-bottom:46px;
}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
h1,h2,h3{font-family:'Reem Kufi',serif;font-weight:600;margin:0}

/* ===== Top ===== */
.topbar{position:sticky;top:0;z-index:30;background:rgba(236,244,238,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:40px;height:40px;border-radius:14px;background:linear-gradient(145deg,var(--green),var(--sage));display:grid;place-items:center;color:#fff;font-family:'Reem Kufi';font-size:20px;box-shadow:0 6px 16px rgba(76,165,133,.35)}
.brand .t1{font-family:'Reem Kufi';font-size:18px;line-height:1}
.brand .t2{font-size:11.5px;color:var(--muted);margin-top:3px}
.topstats{display:flex;align-items:center;gap:9px}
.streak{display:flex;align-items:center;gap:5px;background:var(--gold-soft);border:1px solid #EAD9AC;color:#8A6D1E;padding:7px 11px;border-radius:14px;font-weight:800;font-size:14px}
.coin{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--green-d);padding:7px 12px;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--shadow)}
.coin:active{transform:scale(.95)}
.coin .lbl{font-size:9.5px;color:var(--muted);font-weight:700}
.ring{position:relative;width:48px;height:48px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:12.5px;color:var(--green-d)}

/* ===== Hero (greeting + motivation) ===== */
.hero{margin:18px 0 6px;text-align:center}
.hero .hi{font-family:'Reem Kufi';font-size:23px}
.hero .motiv{font-size:14px;color:var(--green-d);font-weight:700;margin-top:4px;min-height:21px}

/* ===== Date ===== */
.datebar{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 4px}
.datebar button{background:var(--surface);border:1px solid var(--line);width:34px;height:34px;border-radius:11px;font-size:16px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow)}
.datebar button:active{transform:scale(.93)}
.datebar .dlabel{text-align:center;min-width:155px}
.datebar .dlabel .d1{font-family:'Reem Kufi';font-size:15px}
.datebar .dlabel .d2{font-size:12px;color:var(--muted)}
.today-pill{font-size:10.5px;color:#fff;background:var(--green);padding:1px 9px;border-radius:20px;font-weight:800;display:inline-block;margin-top:2px}

/* ===== Inspiration ===== */
.inspo{position:relative;overflow:hidden;border-radius:var(--r);padding:24px 22px;margin:14px 0 22px;background:linear-gradient(140deg,var(--green-d),var(--sage));color:#fff;box-shadow:var(--shadow-lg)}
.inspo::before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);top:-100px;left:-40px}
.inspo .kind{position:relative;font-size:11.5px;font-weight:800;margin-bottom:10px;display:inline-block;background:rgba(255,255,255,.18);padding:4px 13px;border-radius:20px}
.inspo .txt{position:relative;font-family:'Reem Kufi';font-size:20px;line-height:1.9;font-weight:500}
.inspo .src{position:relative;font-size:12px;opacity:.82;margin-top:11px}
.inspo .deco{position:absolute;bottom:-26px;left:-4px;font-size:100px;opacity:.1;font-family:'Reem Kufi';line-height:1}

/* ===== Sections ===== */
.section{margin-bottom:24px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}
.section-head h2{font-size:17px;display:flex;align-items:center;gap:10px}
.section-head .ico{width:31px;height:31px;border-radius:10px;display:grid;place-items:center;font-size:15px;background:var(--green-soft)}
.section-head .meta{font-size:12.5px;color:var(--muted);font-weight:800;background:var(--surface);padding:3px 11px;border-radius:20px;border:1px solid var(--line)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}

/* ===== Progress card (chart + stats) ===== */
.prog-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 18px 14px;margin-bottom:22px}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.prog-top .big{font-family:'Reem Kufi';font-size:15px}
.bigring{position:relative;width:96px;height:96px;margin:0 auto 6px}
.bigring svg{transform:rotate(-90deg)}
.bigring .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.bigring .c .n{font-family:'Reem Kufi';font-size:28px;line-height:1;color:var(--green-d)}
.bigring .c .l{font-size:11px;color:var(--muted)}
.week{display:flex;align-items:flex-end;justify-content:space-between;gap:7px;height:84px;margin-top:8px;padding-top:6px}
.wbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.wbar .bar{width:100%;max-width:26px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--green),var(--sage));min-height:5px;transition:height .5s ease;position:relative}
.wbar.today .bar{background:linear-gradient(180deg,var(--gold),#E0C16B);box-shadow:0 0 0 2px var(--gold-soft)}
.wbar .dl{font-size:10.5px;color:var(--muted);font-weight:700}
.wbar .vv{font-size:9.5px;color:var(--faint)}
.stats3{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:11px 6px}
.stat .sv{font-family:'Reem Kufi';font-size:18px;color:var(--green-d)}
.stat .sl{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:1px}

/* ===== Prayers ===== */
.pray{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;transition:.2s}
.pray+.pray{border-top:1px solid var(--line)}
.pray.done{background:linear-gradient(90deg,var(--green-soft),transparent)}
.pray .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px}
.pray .dot{width:9px;height:9px;border-radius:50%;background:var(--faint);transition:.2s}
.pray.done .dot{background:var(--green)}
.pray .opts{display:flex;gap:6px}
.popt{border:1.5px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:11px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.14s}
.popt:active{transform:scale(.94)}
.popt.on{border-color:transparent;background:var(--green);color:#fff;box-shadow:0 4px 12px rgba(76,165,133,.3)}
.popt.on.home{background:var(--sky);box-shadow:0 4px 12px rgba(111,179,214,.3)}

/* ===== Habits ===== */
.habits{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.habit{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:15px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:8px;min-height:94px;user-select:none;overflow:hidden}
.habit:active{transform:scale(.96)}
.habit .hico{font-size:23px;line-height:1;transition:.25s}
.habit .hname{font-size:13.5px;font-weight:700}
.habit .hsub{font-size:11px;color:var(--faint)}
.habit.done{background:linear-gradient(150deg,var(--green-soft),#EAF6EF);border-color:var(--sage)}
.habit.done .hico{transform:scale(1.12)}
.habit .check{position:absolute;top:12px;left:12px;width:21px;height:21px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;color:transparent;transition:.2s}
.habit.done .check{background:var(--green);border-color:var(--green);color:#fff}
.water{grid-column:1/-1;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:15px 16px}
.water .wtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.water .wname{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.water .wcount{font-weight:800;color:var(--sky);font-family:'Reem Kufi'}
.cups{display:flex;gap:7px}
.cup{flex:1;min-width:0;height:36px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface2);cursor:pointer;display:grid;place-items:center;font-size:15px;transition:.15s;color:var(--faint)}
.cup:active{transform:scale(.88)}
.cup.full{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}

/* ===== Tasks ===== */
.task-add{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--line)}
.task-add input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:14px;background:var(--surface2);color:var(--ink);outline:none}
.task-add input:focus{border-color:var(--green)}
.task-add button{flex:none;width:46px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 12px rgba(76,165,133,.3)}
.task-add button:active{transform:scale(.93)}
.task{display:flex;align-items:center;gap:12px;padding:13px 15px}
.task+.task{border-top:1px solid var(--line)}
.task .tcheck{width:23px;height:23px;border-radius:8px;border:1.5px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px;color:transparent;cursor:pointer;transition:.2s}
.task.done .tcheck{background:var(--green);border-color:var(--green);color:#fff}
.task .ttext{flex:1;font-size:14.5px;font-weight:500}
.task.done .ttext{text-decoration:line-through;color:var(--faint)}
.task .tdel{border:none;background:none;color:var(--faint);font-size:17px;cursor:pointer;padding:4px}
.task .tdel:active{color:var(--rose)}
.empty{text-align:center;color:var(--faint);font-size:13.5px;padding:24px 14px}

/* ===== Money ===== */
.accounts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.acc{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:.15s;overflow:hidden}
.acc:active{transform:scale(.97)}
.acc .an{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px}
.acc .ab{font-size:20px;font-weight:800;margin-top:6px;font-family:'Reem Kufi'}
.acc .ab .cur{font-size:12px;color:var(--faint);font-weight:500;font-family:'Tajawal'}
.money-actions{display:flex;gap:11px;margin-bottom:15px}
.money-actions button{flex:1;border:none;border-radius:14px;padding:14px;font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;transition:.14s;color:#fff}
.money-actions button:active{transform:scale(.96)}
.btn-out{background:var(--rose);box-shadow:0 6px 16px rgba(217,135,115,.3)}
.btn-in{background:var(--green);box-shadow:0 6px 16px rgba(76,165,133,.3)}
.tx{display:flex;align-items:center;gap:12px;padding:13px 15px}
.tx+.tx{border-top:1px solid var(--line)}
.tx .txico{width:38px;height:38px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:17px}
.tx.out .txico{background:var(--rose-soft)}
.tx.in .txico{background:var(--green-soft)}
.tx .txmain{flex:1;min-width:0}
.tx .txcat{font-size:14px;font-weight:700}
.tx .txsub{font-size:11px;color:var(--muted)}
.tx .txamt{font-weight:800;font-size:15px;font-family:'Reem Kufi'}
.tx.out .txamt{color:var(--rose)}
.tx.in .txamt{color:var(--green-d)}
.tx .txdel{border:none;background:none;color:var(--faint);font-size:15px;cursor:pointer;padding:2px 4px}
.spend-bar{display:flex;gap:7px;margin:2px 4px 16px;flex-wrap:wrap}
.spend-chip{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow)}
.spend-chip b{color:var(--rose)}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(39,50,43,.4);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay.show{display:flex}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:26px 26px 0 0;padding:8px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -12px 50px rgba(0,0,0,.18);animation:up .26s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(50px);opacity:.5}to{transform:translateY(0);opacity:1}}
.grab{width:42px;height:4px;border-radius:4px;background:var(--line);margin:8px auto 16px}
.sheet h3{font-size:18px;margin-bottom:18px;text-align:center}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:8px}
.field input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-family:inherit;font-size:15px;background:var(--surface2);color:var(--ink);outline:none}
.field input:focus{border-color:var(--green)}
.field input.big{font-size:28px;font-weight:800;font-family:'Reem Kufi';text-align:center;color:var(--green-d)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip-opt{border:1.5px solid var(--line);background:var(--surface2);border-radius:13px;padding:10px 15px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:.14s}
.chip-opt.on{border-color:transparent;background:var(--green);color:#fff}
.sheet .save{width:100%;border:none;border-radius:15px;padding:16px;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 6px 16px rgba(76,165,133,.3)}
.sheet .save:active{transform:scale(.98)}
.sheet .save.out{background:var(--rose)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;opacity:0;transition:.3s;z-index:100;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* budget + savings */
.budget-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.bsplit{display:flex;gap:12px;margin-bottom:14px}
.bbox{flex:1;text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:12px 8px;cursor:pointer}
.bbox .bl{font-size:11px;color:var(--muted);font-weight:700}
.bbox .bv{font-family:'Reem Kufi';font-size:19px;margin-top:3px}
.bbox.save .bv{color:var(--green-d)}
.bbar-wrap{margin-top:4px}
.bbar-lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px}
.bbar-lbl .r{color:var(--muted)}
.bbar{height:10px;border-radius:6px;background:var(--surface2);border:1px solid var(--line);overflow:hidden}
.bbar .fill{height:100%;border-radius:6px;transition:width .5s}
.bsub{font-size:11.5px;color:var(--muted);margin-top:7px;text-align:center}

.foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:30px}

/* reminder banner */
.remind{background:var(--gold-soft);border:1px solid #EAD9AC;border-radius:var(--r-sm);padding:13px 16px;margin:0 0 16px;display:flex;align-items:center;gap:11px;font-size:13.5px;font-weight:700;color:#8A6D1E}
.remind .rico{font-size:20px}
.remind.challenge{background:var(--sky-soft);border-color:#BBDDEC;color:#2A6585}

/* weekly stats */
.wkstats{display:flex;flex-direction:column}
.wkrow{display:flex;align-items:center;gap:12px;padding:12px 14px}
.wkrow+.wkrow{border-top:1px solid var(--line)}
.wkrow .wkico{width:36px;height:36px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:17px;background:var(--green-soft)}
.wkrow .wkmain{flex:1;min-width:0}
.wkrow .wkname{font-size:13.5px;font-weight:700}
.wkrow .wktrack{height:7px;border-radius:5px;background:var(--surface2);margin-top:6px;overflow:hidden;border:1px solid var(--line)}
.wkrow .wkfill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--sage));transition:width .5s}
.wkrow .wkval{font-family:'Reem Kufi';font-size:15px;color:var(--green-d);flex:none;min-width:54px;text-align:left}

/* ===== Celebration ===== */
.celebrate{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;pointer-events:none}
.celebrate.show{display:flex}
.celebrate .msg{background:#fff;border-radius:24px;padding:26px 30px;text-align:center;box-shadow:var(--shadow-lg);animation:pop .4s cubic-bezier(.2,.9,.3,1.3);pointer-events:auto}
.celebrate .msg .em{font-size:54px;line-height:1}
.celebrate .msg .t{font-family:'Reem Kufi';font-size:21px;margin-top:8px;color:var(--green-d)}
.celebrate .msg .s{font-size:14px;color:var(--muted);margin-top:4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:95;border-radius:2px;pointer-events:none}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
@keyframes fall{to{transform:translateY(105vh) rotate(620deg);opacity:.9}}
@keyframes popdone{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
.popnow{animation:popdone .4s ease}

/* boot loader + lock */
.bootload{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.bootload .spin{width:42px;height:42px;border-radius:50%;border:4px solid var(--green-soft);border-top-color:var(--green);animation:spin 1s linear infinite}
.bootload .bl-t{color:var(--muted);font-weight:700;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lock{position:fixed;inset:0;z-index:210;background:linear-gradient(160deg,var(--green-d),var(--sage));display:none;align-items:center;justify-content:center;padding:24px}
.lock.show{display:flex}
.lock-box{background:#fff;border-radius:24px;padding:30px 26px;width:100%;max-width:340px;text-align:center;box-shadow:var(--shadow-lg)}
.lock-mark{width:56px;height:56px;border-radius:18px;background:linear-gradient(145deg,var(--green),var(--sage));display:grid;place-items:center;color:#fff;font-family:'Reem Kufi';font-size:28px;margin:0 auto 14px}
.lock-box h3{font-size:20px}
.lock-sub{font-size:13px;color:var(--muted);margin:8px 0 18px;line-height:1.7}
.lock-box input{width:100%;border:1.5px solid var(--line);border-radius:14px;padding:14px;font-family:inherit;font-size:22px;text-align:center;letter-spacing:6px;background:var(--surface2);color:var(--ink);outline:none}
.lock-box input:focus{border-color:var(--green)}
.lock-err{color:var(--rose);font-size:12.5px;font-weight:700;min-height:18px;margin:8px 0}

<script>
const $=id=>document.getElementById(id);
const CUR='ج';
const PRAYERS=[['fajr','الفجر'],['dhuhr','الظهر'],['asr','العصر'],['maghrib','المغرب'],['isha','العشاء']];
const HABITS=[
  {k:'quran',ico:'📖',name:'وردي القرآني',sub:'اقرأ وردك'},
  {k:'adhkarAM',ico:'🌅',name:'أذكار الصباح',sub:''},
  {k:'adhkarPM',ico:'🌙',name:'أذكار المساء',sub:''},
  {k:'teeth',ico:'🪥',name:'غسيل الأسنان',sub:''},
  {k:'pill',ico:'💊',name:'الكولشيسين',sub:''},
  {k:'sleep',ico:'😴',name:'نوم ٨ ساعات',sub:''},
  {k:'healthy',ico:'🥗',name:'أكل صحي',sub:''},
];
const WATER_GOAL=8;
const ACCOUNTS=[['vodafone','فودافون كاش','📱'],['etisalat','اتصالات كاش','📲'],['instapay','انستا باي','🏦'],['wallet','المحفظة','👛']];
const CATS=[['breakfast','فطار','🍳'],['outfood','أكل من برا','🍔'],['transport','مواصلات','🚗'],['fun','ترفيه','🎮'],['market','سوبر ماركت','🛒'],['subs','اشتراكات','📺'],['other','حاجة تانية','🧾']];
function getBudget(){return load('life:budget',{monthly:3000,daily:100});}
function setBudget(b){save('life:budget',b);}
const INSPO=[
  {kind:'آية',txt:'وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا',src:'الطلاق'},
  {kind:'آية',txt:'فَإِنَّ مَعَ الْعُسْرِ يُسْرًا',src:'الشرح'},
  {kind:'آية',txt:'وَقُل رَّبِّ زِدْنِي عِلْمًا',src:'طه'},
  {kind:'آية',txt:'إِنَّ اللَّهَ مَعَ الصَّابِرِينَ',src:'البقرة'},
  {kind:'آية',txt:'وَاللَّهُ يُحِبُّ الْمُحْسِنِينَ',src:'آل عمران'},
  {kind:'آية',txt:'وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ',src:'النجم'},
  {kind:'آية',txt:'فَاذْكُرُونِي أَذْكُرْكُمْ',src:'البقرة'},
  {kind:'حديث',txt:'إنما الأعمال بالنيات',src:'متفق عليه'},
  {kind:'حديث',txt:'أحبُّ الأعمال إلى الله أدومها وإن قلّ',src:'متفق عليه'},
  {kind:'حديث',txt:'الكلمة الطيبة صدقة',src:'متفق عليه'},
  {kind:'حديث',txt:'تبسمك في وجه أخيك صدقة',src:'الترمذي'},
  {kind:'دعاء',txt:'اللهم إني أسألك علمًا نافعًا ورزقًا طيبًا وعملًا متقبلًا',src:'دعاء'},
  {kind:'دعاء',txt:'رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي',src:'طه'},
  {kind:'دعاء',txt:'حسبي الله ونعم الوكيل',src:'دعاء'},
  {kind:'حكمة',txt:'مَن سار على الدرب وصل.',src:''},
  {kind:'حكمة',txt:'النجاح مجموع مجهودات صغيرة بتتكرر كل يوم.',src:''},
  {kind:'حكمة',txt:'ابدأ من مكانك، بأدواتك، بما تقدر عليه الآن.',src:''},
  {kind:'حكمة',txt:'يوم كويس واحد بيبدأ بقرار صغير.',src:''},
  {kind:'حكمة',txt:'اللي بتزرعه النهاردة بتحصده بكرة.',src:''},
];
const MOTIV=[
  'يلا نبدأ يوم جميل 🌿','كل حاجة صغيرة بتفرق 💪','إنت أقوى مما تتخيّل ✨',
  'خطوة بخطوة بنوصل 🌱','النهاردة فرصة جديدة 🌤️','كمّل، إنت ماشي صح 👏','ربنا معاك في كل خطوة 🤍'
];

// ===== التخزين السحابي (Supabase) مع كاش محلي =====
const SB_URL='https://dbhfdtzvcvhpgtpyjxsw.supabase.co';
const SB_KEY='sb_publishable_eGCW1yPtO5hM-yAgTlcs1A_dqXrNhgR';
let sb=null; const CACHE={};
function load(k,def){return (k in CACHE)?CACHE[k]:def;}
function save(k,v){
  CACHE[k]=v;
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  if(sb){ sb.from('store').upsert({k,v,updated_at:new Date().toISOString()}).then(r=>{ if(r.error)console.warn('cloud save',r.error.message); }); }
}
async function cloudLoadAll(){
  // املأ الكاش من المحلي الأول (يشتغل أوفلاين)
  try{for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(/^(life:|auth:)/.test(key)){try{CACHE[key]=JSON.parse(localStorage.getItem(key));}catch(e){}}}}catch(e){}
  if(!sb)return;
  try{
    const {data,error}=await sb.from('store').select('k,v');
    if(error){console.warn('cloud load',error.message);return;}
    (data||[]).forEach(r=>{CACHE[r.k]=r.v; try{localStorage.setItem(r.k,JSON.stringify(r.v));}catch(e){}});
  }catch(e){console.warn('cloud load fail',e);}
}
let cursor=new Date(); cursor.setHours(0,0,0,0);
function ymd(d){const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);}
function dayKeyFor(d){return 'life:day:'+ymd(d);}
function dayKey(){return dayKeyFor(cursor);}
function isToday(){return ymd(cursor)===ymd(new Date());}
function blankDay(){return {prayers:{},habits:{},water:0,tasks:[]};}
function getDay(){return load(dayKey(),blankDay());}
function getDayD(d){return load(dayKeyFor(d),blankDay());}
function setDay(d){save(dayKey(),d);}
function getAccounts(){return load('life:accounts',{vodafone:0,etisalat:0,instapay:0,wallet:0});}
function setAccounts(a){save('life:accounts',a);}
function getTx(){return load('life:tx',[]);}
function setTx(t){save('life:tx',t);}

// قيمة الصلاة: مسجد=1 كاملة، بيت=0.6
const PRAY_MOSQUE=1, PRAY_HOME=0.6;
function prayValue(p){return p==='mosque'?PRAY_MOSQUE:p==='home'?PRAY_HOME:0;}
// نسبة إنجاز يوم معيّن
function dayPct(d){
  const day=getDayD(d);
  const pray=PRAYERS.reduce((s,[k])=>s+prayValue(day.prayers[k]),0); // 0..5
  const hab=HABITS.filter(h=>day.habits[h.k]).length+((day.water||0)>=WATER_GOAL?1:0);
  const tT=(day.tasks||[]).length,tD=(day.tasks||[]).filter(t=>t.done).length;
  const total=5+HABITS.length+1+tT, done=pray+hab+tD;
  return total?Math.round(done/total*100):0;
}
// يوم "ناجح" لو ≥60%
function daySuccess(d){return dayPct(d)>=60;}
function calcStreak(){
  let s=0; let d=new Date(); d.setHours(0,0,0,0);
  // لو النهاردة لسه مكملش، نبدأ من امبارح
  if(!daySuccess(d)) d.setDate(d.getDate()-1);
  for(let i=0;i<400;i++){ if(daySuccess(d)){s++; d.setDate(d.getDate()-1);} else break; }
  return s;
}
function bestStreak(){
  // أطول سلسلة في آخر 120 يوم
  let best=0,cur=0,d=new Date();d.setHours(0,0,0,0);
  for(let i=0;i<120;i++){const dd=new Date(d);dd.setDate(dd.getDate()-i);if(daySuccess(dd)){cur++;best=Math.max(best,cur);}else cur=0;}
  return best;
}
function monthAvg(){
  let sum=0,cnt=0,base=new Date(cursor);
  for(let i=0;i<base.getDate();i++){const dd=new Date(base.getFullYear(),base.getMonth(),i+1);if(dd>new Date())break;sum+=dayPct(dd);cnt++;}
  return cnt?Math.round(sum/cnt):0;
}

function render(){renderDate();renderInspo();renderHero();renderReminder();renderPrayers();renderHabits();renderTasks();renderMoney();renderTop();renderProgress();renderWeekly();}
function renderDate(){
  const days=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  $('dLabel').textContent=days[cursor.getDay()];
  $('dSub').innerHTML=cursor.getDate()+' '+months[cursor.getMonth()]+' '+cursor.getFullYear()+(isToday()?' <span class="today-pill">النهاردة</span>':'');
  $('nextBtn').style.visibility=isToday()?'hidden':'visible';
  const h=new Date().getHours();
  $('greet').textContent=h<12?'صباح الخير':h<18?'نهارك سعيد':'مساء الخير';
}
function renderHero(){
  const h=new Date().getHours();
  $('heroHi').textContent=(h<12?'صباح الخير 🌿':h<18?'نهارك سعيد ☀️':'مساء الخير 🌙');
  const pct=dayPct(new Date());
  let m;
  if(pct===0)m=MOTIV[Math.floor(Date.now()/864e5)%MOTIV.length];
  else if(pct<40)m='بداية حلوة، كمّل 💪';
  else if(pct<70)m='ماشي تمام، نص الطريق 🌱';
  else if(pct<100)m='قربت تخلّص، شدّ حيلك ✨';
  else m='يومك كامل! بطل 🏆';
  $('heroMotiv').textContent=m;
}
function renderInspo(){
  const seed=Math.floor(cursor.getTime()/864e5)%INSPO.length;
  const it=INSPO[((seed%INSPO.length)+INSPO.length)%INSPO.length];
  $('inspoKind').textContent=it.kind;$('inspoTxt').textContent=it.txt;
  $('inspoSrc').textContent=it.src?('﴿ '+it.src+' ﴾'):'';$('inspoSrc').style.display=it.src?'block':'none';
}
function renderPrayers(){
  const d=getDay();let done=0,mosque=0;
  $('prayers').innerHTML=PRAYERS.map(([k,name])=>{const p=d.prayers[k];if(p)done++;if(p==='mosque')mosque++;
    return `<div class="pray ${p?'done':''}"><div class="nm"><span class="dot"></span>${name}</div>
      <div class="opts"><button class="popt ${p==='mosque'?'on':''}" onclick="setPrayer('${k}','mosque')">🕌 جامع</button>
      <button class="popt home ${p==='home'?'on':''}" onclick="setPrayer('${k}','home')">🏠 بيت</button></div></div>`;}).join('');
  $('prayMeta').innerHTML=done+'/5'+(mosque?` · 🕌 ${mosque}`:'');
}
function setPrayer(k,place){const d=getDay();const was=d.prayers[k];d.prayers[k]=(was===place)?null:place;if(!d.prayers[k])delete d.prayers[k];setDay(d);
  renderPrayers();renderTop();renderProgress();renderHero();
  if(isToday()&&PRAYERS.every(([kk])=>getDay().prayers[kk])&&!(was&&PRAYERS.filter(([kk])=>getDay().prayers[kk]).length===5)) maybeCelebrate('prayers');}
function renderHabits(){
  const d=getDay();let done=0;const total=HABITS.length+1;
  let html=`<div class="water"><div class="wtop"><div class="wname">💧 ٨ كوبايات مية</div><div class="wcount"><span>${d.water||0}</span>/${WATER_GOAL}</div></div>
    <div class="cups">${Array.from({length:WATER_GOAL}).map((_,i)=>`<div class="cup ${i<(d.water||0)?'full':''}" onclick="setWater(${i+1})">${i<(d.water||0)?'💧':''}</div>`).join('')}</div></div>`;
  if((d.water||0)>=WATER_GOAL)done++;
  html+=HABITS.map(h=>{const on=d.habits[h.k];if(on)done++;
    return `<div class="habit ${on?'done':''}" onclick="toggleHabit('${h.k}')"><div class="check">✓</div>
      <div class="hico">${h.ico}</div><div><div class="hname">${h.name}</div>${h.sub?`<div class="hsub">${h.sub}</div>`:''}</div></div>`;}).join('');
  $('habits').innerHTML=html;$('habitMeta').textContent=done+'/'+total;
}
function setWater(n){const d=getDay();d.water=(d.water===n)?n-1:n;setDay(d);renderHabits();renderTop();renderProgress();renderHero();renderWeekly();renderReminder();}
function toggleHabit(k){const d=getDay();d.habits[k]=!d.habits[k];if(!d.habits[k])delete d.habits[k];setDay(d);renderHabits();renderTop();renderProgress();renderHero();renderWeekly();renderReminder();renderWeekly();renderReminder();
  if(isToday()&&dayPct(new Date())===100)maybeCelebrate('all');}
function renderTasks(){
  const d=getDay();const ts=d.tasks||[];let done=ts.filter(t=>t.done).length;
  $('tasks').innerHTML=ts.length?ts.map(t=>`<div class="task ${t.done?'done':''}"><div class="tcheck" onclick="toggleTask('${t.id}')">✓</div>
    <div class="ttext">${esc(t.text)}</div><button class="tdel" onclick="delTask('${t.id}')">✕</button></div>`).join('')
    :`<div class="empty">مفيش مهام لليوم ده — ضيف واحدة 🌱</div>`;
  $('taskMeta').textContent=done+'/'+ts.length;
}
function addTask(){const inp=$('taskInput');const v=inp.value.trim();if(!v)return;const d=getDay();d.tasks=d.tasks||[];d.tasks.push({id:rid(),text:v,done:false});setDay(d);inp.value='';renderTasks();renderTop();renderProgress();}
function toggleTask(id){const d=getDay();const t=(d.tasks||[]).find(x=>x.id===id);if(t)t.done=!t.done;setDay(d);renderTasks();renderTop();renderProgress();renderHero();if(isToday()&&dayPct(new Date())===100)maybeCelebrate('all');}
function delTask(id){const d=getDay();d.tasks=(d.tasks||[]).filter(x=>x.id!==id);setDay(d);renderTasks();renderTop();renderProgress();}

function renderMoney(){
  const acc=getAccounts();
  $('accounts').innerHTML=ACCOUNTS.map(([k,name,ico])=>`<div class="acc" onclick="openEditAccount('${k}')"><div class="an">${ico} ${name}</div><div class="ab">${fmt(acc[k]||0)} <span class="cur">${CUR}</span></div></div>`).join('');
  const ym=ymd(cursor).slice(0,7);const tx=getTx().filter(t=>t.date.slice(0,7)===ym);
  const out=tx.filter(t=>t.type==='out');const byCat={};out.forEach(t=>{byCat[t.cat]=(byCat[t.cat]||0)+t.amount;});
  const totalOut=out.reduce((s,t)=>s+t.amount,0);const totalIn=tx.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0);
  $('moneyMeta').textContent=`−${fmt(totalOut)} / +${fmt(totalIn)}`;
  // ----- budget + savings -----
  const bud=getBudget();
  const todayOut=getTx().filter(t=>t.type==='out'&&t.date===ymd(cursor)).reduce((s,t)=>s+t.amount,0);
  const savings=totalIn-totalOut;
  const dPct=Math.min(100,bud.daily?todayOut/bud.daily*100:0);
  const mPct=Math.min(100,bud.monthly?totalOut/bud.monthly*100:0);
  const dCol=todayOut>bud.daily?'var(--rose)':todayOut>bud.daily*0.8?'var(--gold)':'var(--green)';
  const mCol=totalOut>bud.monthly?'var(--rose)':totalOut>bud.monthly*0.8?'var(--gold)':'var(--green)';
  $('budgetCard').innerHTML=`
    <div class="bsplit">
      <div class="bbox save"><div class="bl">💰 تحويش الشهر</div><div class="bv">${fmt(savings)} ${CUR}</div></div>
      <div class="bbox" onclick="openBudget()"><div class="bl">🎯 حدودي (دوس للتعديل)</div><div class="bv">${fmt(bud.daily)}/${fmt(bud.monthly)}</div></div>
    </div>
    <div class="bbar-wrap" style="margin-bottom:12px">
      <div class="bbar-lbl"><span>📅 مصروف النهاردة</span><span class="r">${fmt(todayOut)} / ${fmt(bud.daily)}</span></div>
      <div class="bbar"><div class="fill" style="width:${dPct}%;background:${dCol}"></div></div>
      ${todayOut>bud.daily?`<div class="bsub" style="color:var(--rose)">عدّيت حدّك اليومي بـ ${fmt(todayOut-bud.daily)} ج</div>`:''}
    </div>
    <div class="bbar-wrap">
      <div class="bbar-lbl"><span>🗓 مصروف الشهر</span><span class="r">${fmt(totalOut)} / ${fmt(bud.monthly)}</span></div>
      <div class="bbar"><div class="fill" style="width:${mPct}%;background:${mCol}"></div></div>
      ${totalOut>bud.monthly?`<div class="bsub" style="color:var(--rose)">عدّيت حدّك الشهري بـ ${fmt(totalOut-bud.monthly)} ج</div>`:`<div class="bsub">فاضلك ${fmt(Math.max(0,bud.monthly-totalOut))} ج للحد الشهري</div>`}
    </div>`;
  const chips=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>{const cat=CATS.find(x=>x[0]===c);return `<div class="spend-chip">${cat?cat[2]+' '+cat[1]:c} <b>${fmt(v)}</b></div>`;}).join('');
  $('spendBar').innerHTML=chips||`<div class="spend-chip" style="color:var(--faint)">لسه مفيش مصاريف الشهر ده</div>`;
  const recent=getTx().slice().sort((a,b)=>b.ts-a.ts).slice(0,12);
  $('txList').innerHTML=recent.length?recent.map(t=>{const cat=CATS.find(x=>x[0]===t.cat);const ac=ACCOUNTS.find(x=>x[0]===t.account);
    return `<div class="tx ${t.type}"><div class="txico">${t.type==='in'?'⬆️':(cat?cat[2]:'🧾')}</div>
      <div class="txmain"><div class="txcat">${t.type==='in'?'دخل':(cat?cat[1]:'مصروف')}${t.note?' · '+esc(t.note):''}</div><div class="txsub">${ac?ac[1]:''} · ${t.date}</div></div>
      <div class="txamt">${t.type==='out'?'−':'+'}${fmt(t.amount)}</div><button class="txdel" onclick="delTx('${t.id}')">✕</button></div>`;}).join('')
    :`<div class="empty">سجّل أول حركة فلوس 💸</div>`;
}
function delTx(id){const tx=getTx();const t=tx.find(x=>x.id===id);if(!t)return;if(!confirm('تشيل الحركة دي؟ هترجّع الفلوس للحساب.'))return;
  const acc=getAccounts();if(t.type==='out')acc[t.account]=(acc[t.account]||0)+t.amount;else acc[t.account]=(acc[t.account]||0)-t.amount;
  setAccounts(acc);setTx(tx.filter(x=>x.id!==id));renderMoney();renderTop();toast('اتشالت');}

function renderTop(){
  const acc=getAccounts();const total=ACCOUNTS.reduce((s,[k])=>s+(acc[k]||0),0);$('totalMoney').textContent=fmt(total);
  const pct=dayPct(cursor);$('ringPct').textContent=pct+'%';const C=125.7;$('ringFill').style.strokeDashoffset=C-(C*pct/100);
  $('ringFill').style.stroke=pct>=80?'#4CA585':pct>=40?'#C9A24B':'#D98873';
  const st=calcStreak();$('streakN').textContent=st;
}
// تذكير داخل السايت + تحدّي يومي (للنهاردة بس)
function renderReminder(){
  const box=$('reminder'); if(!isToday()){box.innerHTML='';return;}
  const d=getDay();
  const h=new Date().getHours();
  let msgs=[];
  // صلاة لسه ما اتسجّلتش حسب الوقت
  const order=[['fajr','الفجر',5],['dhuhr','الظهر',13],['asr','العصر',16],['maghrib','المغرب',19],['isha','العشاء',20]];
  const duePray=order.filter(([k,n,hr])=>h>=hr && !d.prayers[k]).map(x=>x[1]);
  if(duePray.length) msgs.push({ico:'🕌',cls:'',t:`لسه ما سجّلتش: ${duePray.join('، ')}`});
  if((d.water||0)<WATER_GOAL && h>=12) msgs.push({ico:'💧',cls:'',t:`شربت ${d.water||0} كوبايات بس — كمّل لـ ٨`});
  if(!d.habits.adhkarAM && h<12) msgs.push({ico:'🌅',cls:'',t:'متنساش أذكار الصباح'});
  if(!d.habits.adhkarPM && h>=17) msgs.push({ico:'🌙',cls:'',t:'متنساش أذكار المساء'});
  if(!d.habits.pill && h>=12) msgs.push({ico:'💊',cls:'',t:'أخدت الكولشيسين؟'});
  let html='';
  if(msgs.length){const m=msgs[0];html+=`<div class="remind ${m.cls}"><span class="rico">${m.ico}</span><span>${m.t}</span></div>`;}
  // تحدّي اليوم
  const ch=dailyChallenge();
  if(ch) html+=`<div class="remind challenge"><span class="rico">🎯</span><span>تحدّي النهاردة: ${ch}</span></div>`;
  box.innerHTML=html;
}
function dailyChallenge(){
  const list=[
    'صلّي صلاتين في المسجد','اشرب الـ ٨ كوبايات كاملة','اقرأ وردك القرآني',
    'خلّص كل مهامك','نام بدري عشان الـ ٨ ساعات','صلّي الفجر في وقته','يوم كامل ١٠٠٪ 🌟'
  ];
  return list[Math.floor(Date.now()/864e5)%list.length];
}
// إحصائيات آخر ٧ أيام
function renderWeekly(){
  let prayTotal=0,mosqueTotal=0,water=0,quran=0,adhkar=0,sleep=0,healthy=0,outSum=0,inSum=0;
  for(let i=0;i<7;i++){const dd=new Date();dd.setDate(dd.getDate()-i);const day=getDayD(dd);
    PRAYERS.forEach(([k])=>{if(day.prayers[k])prayTotal++;if(day.prayers[k]==='mosque')mosqueTotal++;});
    water+=(day.water||0);
    if(day.habits.quran)quran++; if(day.habits.adhkarAM&&day.habits.adhkarPM)adhkar++;
    if(day.habits.sleep)sleep++; if(day.habits.healthy)healthy++;
  }
  const tx=getTx();const wk=new Date();wk.setDate(wk.getDate()-6);wk.setHours(0,0,0,0);
  tx.forEach(t=>{const td=new Date(t.date+'T00:00:00');if(td>=wk){if(t.type==='out')outSum+=t.amount;else inSum+=t.amount;}});
  const rows=[
    {ico:'🕌',name:'الصلاة',val:prayTotal+'/35',pct:prayTotal/35*100,extra:mosqueTotal?` (${mosqueTotal} مسجد)`:''},
    {ico:'💧',name:'كوبايات المية',val:water+'',pct:Math.min(100,water/56*100)},
    {ico:'📖',name:'الورد القرآني',val:quran+'/7',pct:quran/7*100},
    {ico:'🌅',name:'الأذكار (صباح+مساء)',val:adhkar+'/7',pct:adhkar/7*100},
    {ico:'😴',name:'نوم ٨ ساعات',val:sleep+'/7',pct:sleep/7*100},
    {ico:'🥗',name:'أكل صحي',val:healthy+'/7',pct:healthy/7*100},
    {ico:'💸',name:'مصاريف الأسبوع',val:fmt(outSum)+' ج',pct:0,noBar:true},
  ];
  $('wkStats').innerHTML=rows.map(r=>`<div class="wkrow"><div class="wkico">${r.ico}</div>
    <div class="wkmain"><div class="wkname">${r.name}${r.extra||''}</div>
    ${r.noBar?'':`<div class="wktrack"><div class="wkfill" style="width:${Math.round(r.pct)}%"></div></div>`}</div>
    <div class="wkval">${r.val}</div></div>`).join('');
}
function renderProgress(){
  const pct=dayPct(cursor);$('bigPct').textContent=pct+'%';const C=263.9;$('bigRingFill').style.strokeDashoffset=C-(C*pct/100);
  $('bigRingFill').style.stroke=pct>=80?'#4CA585':pct>=40?'#C9A24B':'#D98873';
  // week chart (آخر 7 أيام منتهية بـ cursor)
  const dl=['ح','ن','ث','ر','خ','ج','س'];
  let html='';
  for(let i=6;i>=0;i--){const dd=new Date(cursor);dd.setDate(dd.getDate()-i);const p=dayPct(dd);const isT=ymd(dd)===ymd(new Date());
    html+=`<div class="wbar ${isT?'today':''}"><div class="vv">${p?p+'%':''}</div><div class="bar" style="height:${Math.max(5,p)}%"></div><div class="dl">${dl[dd.getDay()]}</div></div>`;}
  $('weekChart').innerHTML=html;
  $('stStreak').textContent=calcStreak();$('stBest').textContent=bestStreak();$('stMonth').textContent=monthAvg()+'%';
}

// ===== celebration =====
let _celShown={};
function maybeCelebrate(type){
  const key=ymd(new Date())+':'+type;
  if(_celShown[key])return;_celShown[key]=true;
  if(type==='all')celebrate('🏆','يومك كامل!','أنجزت كل حاجة النهاردة — فخور بيك!');
  else if(type==='prayers')celebrate('🕌','الصلوات الخمس ✓','ربنا يتقبّل منك 🤍');
}
function celebrate(em,t,s){
  $('celEm').textContent=em;$('celT').textContent=t;$('celS').textContent=s;
  $('celebrate').classList.add('show');confetti();
  setTimeout(()=>$('celebrate').classList.remove('show'),2600);
}
function confetti(){
  const colors=['#4CA585','#6FB3D6','#C9A24B','#D98873','#A99BD4','#8FBFA8'];
  for(let i=0;i<70;i++){const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=colors[i%colors.length];
    c.style.animation=`fall ${1.6+Math.random()*1.4}s ${Math.random()*.4}s ease-in forwards`;
    c.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(c);
    setTimeout(()=>c.remove(),3400);}
}

function openTx(type){
  let cat='breakfast',account='vodafone';
  const catRow=type==='out'?`<div class="field"><label>الفئة</label><div class="chips" id="catChips">${CATS.map(c=>`<button class="chip-opt ${c[0]==='breakfast'?'on':''}" data-c="${c[0]}">${c[2]} ${c[1]}</button>`).join('')}</div></div>`:'';
  sheet(`<h3>${type==='out'?'➖ مصروف جديد':'➕ دخل جديد'}</h3>
    <div class="field"><label>المبلغ (${CUR})</label><input class="big" id="txAmount" type="number" inputmode="decimal" placeholder="0" autofocus></div>${catRow}
    <div class="field"><label>${type==='out'?'اتدفع من':'اتضاف لـ'}</label><div class="chips" id="accChips">${ACCOUNTS.map(a=>`<button class="chip-opt ${a[0]==='vodafone'?'on':''}" data-a="${a[0]}">${a[2]} ${a[1]}</button>`).join('')}</div></div>
    <div class="field"><label>ملاحظة (اختياري)</label><input id="txNote" placeholder="مثلاً: قهوة"></div>
    <button class="save ${type==='out'?'out':''}" id="txSave">${type==='out'?'سجّل المصروف':'سجّل الدخل'}</button>`);
  if(type==='out')document.querySelectorAll('#catChips .chip-opt').forEach(b=>b.onclick=()=>{cat=b.dataset.c;sel('#catChips',b);});
  document.querySelectorAll('#accChips .chip-opt').forEach(b=>b.onclick=()=>{account=b.dataset.a;sel('#accChips',b);});
  $('txSave').onclick=()=>{const amt=parseFloat($('txAmount').value);if(!amt||amt<=0)return toast('اكتب مبلغ صح');
    const note=$('txNote').value.trim();const acc=getAccounts();
    if(type==='out')acc[account]=(acc[account]||0)-amt;else acc[account]=(acc[account]||0)+amt;setAccounts(acc);
    const tx=getTx();tx.push({id:rid(),ts:Date.now(),date:ymd(cursor),type,amount:amt,cat:type==='out'?cat:null,account,note});setTx(tx);
    closeSheet();renderMoney();renderTop();toast(type==='out'?'اتسجّل المصروف ✓':'اتسجّل الدخل ✓');};
}
function openEditAccount(k){const acc=getAccounts();const a=ACCOUNTS.find(x=>x[0]===k);
  sheet(`<h3>${a[2]} ${a[1]}</h3><div class="field"><label>الرصيد الحالي (${CUR})</label><input class="big" id="accVal" type="number" inputmode="decimal" value="${acc[k]||0}" autofocus></div><button class="save" id="accSave">حفظ الرصيد</button>`);
  $('accSave').onclick=()=>{const v=parseFloat($('accVal').value);if(isNaN(v))return toast('اكتب رقم صح');const a2=getAccounts();a2[k]=v;setAccounts(a2);closeSheet();renderMoney();renderTop();toast('اتحفظ ✓');};}
function openBudget(){const b=getBudget();
  sheet(`<h3>🎯 حدود المصروف</h3>
    <div class="field"><label>الحد اليومي (${CUR})</label><input class="big" id="budD" type="number" inputmode="decimal" value="${b.daily}"></div>
    <div class="field"><label>الحد الشهري (${CUR})</label><input class="big" id="budM" type="number" inputmode="decimal" value="${b.monthly}"></div>
    <div class="bsub" style="margin-bottom:12px">نصيحة: الحد اليومي عادةً = الشهري ÷ ٣٠</div>
    <button class="save" id="budSave">حفظ الحدود</button>`);
  $('budSave').onclick=()=>{const d=parseFloat($('budD').value),m=parseFloat($('budM').value);
    if(isNaN(d)||isNaN(m))return toast('اكتب أرقام صح');
    setBudget({daily:d,monthly:m});closeSheet();renderMoney();toast('اتحفظت الحدود ✓');};
}
function openAccounts(){const acc=getAccounts();
  sheet(`<h3>🪙 حساباتي</h3>${ACCOUNTS.map(([k,name,ico])=>`<div class="field"><label>${ico} ${name}</label><input type="number" inputmode="decimal" data-acc="${k}" value="${acc[k]||0}"></div>`).join('')}<button class="save" id="accsSave">حفظ الكل</button>`);
  $('accsSave').onclick=()=>{const a=getAccounts();document.querySelectorAll('[data-acc]').forEach(i=>{const v=parseFloat(i.value);a[i.dataset.acc]=isNaN(v)?0:v;});setAccounts(a);closeSheet();renderMoney();renderTop();toast('اتحفظت ✓');};}

function sheet(html){$('sheet').innerHTML='<div class="grab"></div>'+html;$('overlay').classList.add('show');}
function closeSheet(){$('overlay').classList.remove('show');}
function sel(scope,btn){document.querySelectorAll(scope+' .chip-opt').forEach(x=>x.classList.toggle('on',x===btn));}
function shiftDay(dir){const n=new Date(cursor);n.setDate(n.getDate()-dir);n.setHours(0,0,0,0);if(n>new Date())return;cursor=n;render();}
function fmt(n){n=Math.round((n+Number.EPSILON)*100)/100;return n.toLocaleString('en-US');}
function esc(s){return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function rid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
let _t;function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),1800);}
$('overlay').addEventListener('click',e=>{if(e.target===$('overlay'))closeSheet();});
$('celebrate').addEventListener('click',()=>$('celebrate').classList.remove('show'));

// ===== الإقلاع: تحميل سحابي ثم قفل ثم عرض =====
function gate(){
  return new Promise(resolve=>{
    const cloudPin=load('auth:pin',null);
    const devPin=localStorage.getItem('yomy:devpin');
    if(cloudPin && devPin===cloudPin){resolve();return;}
    const lock=$('lock'); lock.classList.add('show');
    const create=!cloudPin;
    $('lockTitle').textContent=create?'🔒 اعمل كلمة سر':'🔒 اكتب كلمة السر';
    $('lockSub').textContent=create?'عشان حد ما يفتحش بياناتك. هتكتبها مرة على كل جهاز.':'دخّل كلمة السر بتاعتك';
    $('lockInput').value=''; $('lockErr').textContent=''; setTimeout(()=>$('lockInput').focus(),200);
    function submit(){
      const v=$('lockInput').value.trim(); if(!v){$('lockErr').textContent='اكتب كلمة السر';return;}
      if(create){ save('auth:pin',v); localStorage.setItem('yomy:devpin',v); lock.classList.remove('show'); resolve(); }
      else { if(v===cloudPin){ localStorage.setItem('yomy:devpin',v); lock.classList.remove('show'); resolve(); } else { $('lockErr').textContent='كلمة السر غلط'; $('lockInput').value=''; } }
    }
    $('lockBtn').onclick=submit;
    $('lockInput').onkeydown=e=>{if(e.key==='Enter')submit();};
  });
}
async function boot(){
  $('bootLoad').style.display='flex';
  try{ sb=window.supabase.createClient(SB_URL,SB_KEY); }catch(e){ console.warn('sb init',e); }
  await cloudLoadAll();
  $('bootLoad').style.display='none';
  await gate();
  render();
}
boot();
</script>
